[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "promptshield-core"
version = "0.1.0"
description = "PromptShield shared core library - decision engine, token estimation, classification, policy"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.0",
    "tiktoken>=0.7",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
]

[tool.hatch.build.targets.wheel]
packages = ["promptshield_core"]
