version: "3.9"

# ============================================================
# PromptShield Enterprise - Docker Compose
# ============================================================
# Usage:
#   cp deploy/compose/.env.example deploy/compose/.env
#   docker compose -f deploy/compose/docker-compose.yml up -d

services:
  # ----------------------------------------------------------
  # PostgreSQL - primary data store
  # ----------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: promptshield-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-promptshield}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-promptshield}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-promptshield}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------
  # Redis - quota counters and caching
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: promptshield-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-}
      --save 60 1
      --loglevel warning
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------
  # Enterprise API
  # ----------------------------------------------------------
  enterprise-api:
    build:
      context: ../..
      dockerfile: deploy/docker/enterprise-api.Dockerfile
    container_name: promptshield-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-promptshield}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-promptshield}
      REDIS_URL: redis://:${REDIS_PASSWORD:-}@redis:6379/0
    ports:
      - "${ENTERPRISE_API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ----------------------------------------------------------
  # Enterprise UI
  # ----------------------------------------------------------
  enterprise-ui:
    build:
      context: ../..
      dockerfile: deploy/docker/enterprise-ui.Dockerfile
      args:
        VITE_API_BASE_URL: http://enterprise-api:8000/api
    container_name: promptshield-ui
    restart: unless-stopped
    ports:
      - "${ENTERPRISE_UI_PORT:-3000}:80"
    depends_on:
      enterprise-api:
        condition: service_healthy

  # ----------------------------------------------------------
  # Prometheus (optional metrics)
  # ----------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: promptshield-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    profiles:
      - monitoring

volumes:
  postgres_data:
    name: promptshield_postgres_data
  redis_data:
    name: promptshield_redis_data
  prometheus_data:
    name: promptshield_prometheus_data
